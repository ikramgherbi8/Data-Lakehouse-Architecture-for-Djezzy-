version: "3"
services:
  namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop2.7.4-java8
    volumes:
      - namenode:/hadoop/dfs/name
    environment:
      - CLUSTER_NAME=test
    env_file:
      - ./hadoop-hive.env
    ports:
      - "50070:50070"
  datanode:
    image: bde2020/hadoop-datanode:2.0.0-hadoop2.7.4-java8
    volumes:
      - datanode:/hadoop/dfs/data
    env_file:
      - ./hadoop-hive.env
    environment:
      SERVICE_PRECONDITION: "namenode:50070"
    ports:
      - "50075:50075"
  hive-server:
    image: bde2020/hive:2.3.2-postgresql-metastore
    env_file:
      - ./hadoop-hive.env
    environment:
      HIVE_CORE_CONF_javax_jdo_option_ConnectionURL: "jdbc:postgresql://hive-metastore/metastore"
      SERVICE_PRECONDITION: "hive-metastore:9083"
    ports:
      - "10000:10000"
  hive-metastore:
    image: bde2020/hive:2.3.2-postgresql-metastore
    env_file:
      - ./hadoop-hive.env
    command: /opt/hive/bin/hive --service metastore
    environment:
      SERVICE_PRECONDITION: "namenode:50070 datanode:50075 hive-metastore-postgresql:5432"
    ports:
      - "9083:9083"
  hive-metastore-postgresql:
    image: bde2020/hive-metastore-postgresql:2.3.0
    volumes:
      - hive_metastore_db:/var/lib/postgresql/data
  trino-coordinator:
    image: trinodb/trino:406
    container_name: trino-coordinator
    hostname: trino-coordinator
    ports:
      - "8080:8080"
    volumes:
      - ./trino/catalog:/etc/trino/catalog
      - ./trino/config.properties:/etc/trino/config.properties
      - ./trino/node.properties:/etc/trino/node.properties
      - ./core-site.xml:/etc/trino/core-site.xml
      - ./hdfs-site.xml:/etc/trino/hdfs-site.xml
  spark-master:
    image: bde2020/spark-master:2.4.5-hadoop2.7
    container_name: spark-master
    ports:
      - "8090:8080"
      - "7077:7077"
    environment:
      - INIT_DAEMON_STEP=setup_spark
      - SPARK_MASTER_OPTS=-Dspark.master.rest.enabled=true
    env_file:
      - ./hadoop-hive.env
    volumes:
      - C:/hudi-jars:/spark/jars/hudi-jars

  spark-worker1:
    image: bde2020/spark-worker:2.4.5-hadoop2.7
    container_name: spark-worker1
    depends_on:
      - spark-master
    ports:
      - "8081:8081"
    environment:
      - SPARK_MASTER=spark://spark-master:7077
    env_file:
      - ./hadoop-hive.env
    volumes:
      - C:/hudi-jars:/spark/jars/hudi-jars

  spark-worker2:
    image: bde2020/spark-worker:2.4.5-hadoop2.7
    container_name: spark-worker2
    depends_on:
      - spark-master
    ports:
      - "8082:8081"
    environment:
      - SPARK_MASTER=spark://spark-master:7077
    env_file:
      - ./hadoop-hive.env
    volumes:
      - C:/hudi-jars:/spark/jars/hudi-jars
  nifi:
    image: apache/nifi:1.24.0
    container_name: nifi
    ports:
      - "8443:8443"
    volumes:
      - C:/nifi-1.24.0/conf:/opt/nifi/nifi-current/conf
      - C:/hive-jdbc-3.1.3-standalone.jar:/opt/nifi/nifi-current/hive-jdbc-3.1.3-standalone.jar
      - C:/docker-hive/core-site.xml:/opt/nifi/hadoop/core-site.xml
      - C:/docker-hive/hdfs-site.xml:/opt/nifi/hadoop/hdfs-site.xml
      - C:/djezzy-data:/opt/nifi/data
      - //./pipe/docker_engine://./pipe/docker_engine
    environment:
      - NIFI_WEB_HTTPS_HOST=0.0.0.0
      - NIFI_WEB_HTTPS_PORT=8443
    restart: on-failure
volumes:
  namenode:
  datanode:
  hive_metastore_db: